        function capflt(val) {
            return String(val).charAt(0).toUpperCase() + String(val).slice(1);
        };

        function response(){
            const wordmount = Math.floor(Math.random() * 10);
            let sentencef = []
            for (let i = 0; i < wordmount; i++) {
                const numbword = Math.floor(Math.random()*possibility.length);
                const pickedword = possibility[numbword];
                sentencef.push(pickedword);
            }
            let firstword = sentencef[0];
            firstword = capflt(firstword);
            sentencef[0] = firstword;
            return sentencef.join(" ");
        };
        function ranint(max) {
            return Math.floor(Math.random() * max);
        }
        async function writebit(ele, sent){
            for (let i = 0; i <= sent.length; i++) {
                const charat = sent.charAt(i);
                ele.textContent = ele.textContent.concat(charat);
                await new Promise(resolve => setTimeout(resolve, 20));;
            }
        };     
        async function writebitspans(ele, sent, tabele){
            for (let i = 0; i <= sent.length; i++) {
                const charat = sent.split(" ")[i]
                if (charat === undefined) {
                    return;
                }
                let highlightclassname = "normaltext"
                const newspan = document.createElement("span")
                newspan.style.fontFamily = "system-ui"
                let mark = false
                for (var construct of tabele) {
                    construct.txts.forEach(element => {
                        if (charat === element) {
                            highlightclassname = construct.classname
                        }
                    });
                }
                newspan.classList.add(highlightclassname)
                newspan.textContent = " "+charat+" "
                ele.appendChild(newspan)
                await new Promise(resolve => setTimeout(resolve, 20));;
            }
        };      
        function codegen(ele){
            const wordmount = Math.floor(Math.random() * 300);
            let sentencef = [];
            for (let i = 0; i < wordmount; i++) {
                const numbword = Math.floor(Math.random()*codepossibility.length);
                const pickedword = codepossibility[numbword];
                sentencef.push(pickedword);
            }
            let firstword = sentencef[0];
            firstword = capflt(firstword);
            sentencef[0] = firstword;
            writebitspans(ele, sentencef.join(" "), [{txts: ["def", "global", "private", "local", "static", "void", "public", "class", "struct"], classname: "rebtext"}, {txts: ["require"], classname: "blutext"}])
        };
        function gen(){
            if (event.key === "Enter") {

                body.insertBefore(usrmsg, inputbar);
                body.insertBefore(botmsg, inputbar);
                if (inputbar.value.match("code") || inputbar.value.match("java") || inputbar.value.match("lua") || inputbar.value.match("js") || inputbar.value.match("programming")) {

                    codeblock.style.textWrap = "true";

                    codeblock.style.maxWidth = "560px";
                    body.insertBefore(parentesque, inputbar);

                }
